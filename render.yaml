# Render Blueprint for the KTMS admin API (FastAPI backend).
#
# Setup: Render dashboard -> New -> Blueprint -> connect this repo.
# Render reads this file and provisions the web service below.
# You will be prompted to paste DATABASE_URL (the Neon connection string).
#
# Pairs with the Vercel frontend (web/) via NEXT_PUBLIC_API_BASE, which must
# be set to this service's URL (e.g. https://ktms-admin-api.onrender.com).
services:
  - type: web
    name: ktms-admin-api
    runtime: python
    # DB(Neon)가 싱가포르에 있으므로 API 도 같은 리전으로 둬야 DB 왕복 지연이 사라진다.
    # 기존 Oregon(US West) ↔ Neon Singapore 는 태평양 횡단이라 쿼리마다 ~1초 손해.
    # 주의: Render 는 기존 서비스의 리전을 in-place 로 변경할 수 없다. 이 값은
    #       서비스 재생성(블루프린트로 신규 생성)으로만 적용된다.
    region: singapore
    # starter: 무료 플랜과 달리 유휴 시 서버를 잠재우지 않아 콜드 스타트(최초
    # 로딩 30~50초 지연)가 사라진다. 적용하려면 Render 대시보드에 결제수단이
    # 등록돼 있어야 하며, 블루프린트 동기화 시 요금제가 반영된다.
    plan: starter
    rootDir: ktms
    buildCommand: pip install -r requirements-api.txt && python scripts/download_fonts.py
    # init_db.py is idempotent (create-if-missing tables/admin), so it is safe
    # to run on every boot. Then start uvicorn bound to Render's $PORT.
    startCommand: python init_db.py && uvicorn admin_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Neon Postgres connection string — paste at blueprint setup.
      # Format: postgresql://USER:PASSWORD@HOST/DB?sslmode=require
      - key: DATABASE_URL
        sync: false
      # JWT signing secret — generated and stored in Render only.
      - key: SECRET_KEY
        generateValue: true
      # Pilot static bearer fallback — generated (frontend uses login JWT,
      # so this is just a non-guessable fallback, not "dev-token").
      - key: ADMIN_API_TOKEN
        generateValue: true
      # Anthropic key for RFQ/Order PDF OCR (services/pdf_parser.py). Without
      # it the /api/admin/ocr/* endpoints return an error. Paste at setup.
      - key: ANTHROPIC_API_KEY
        sync: false
      # SMTP for outbound email (Vendor RFQ / Quotation / Vendor PO / SA).
      # SMTP_USER + SMTP_PASSWORD are required for sending; without them the
      # API still saves to DB but reports smtp_configured=false. HOST/PORT/FROM
      # have code defaults (smtp.gmail.com:587) — set them if using a non-Gmail
      # relay.
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      # Public customer tracking link base (services use TRACKING_BASE_URL;
      # defaults to https://www.k-maris.com/track).
      - key: TRACKING_BASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.8"
