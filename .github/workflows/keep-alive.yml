# Render 무료 플랜은 약 15분간 요청이 없으면 서버가 잠들고, 다시 깨우는 데
# 30~50초가 걸린다. 그 사이 로그인 요청이 매달려 "계속 로그인 시도중…" 또는
# "Failed to fetch"로 보인다. 이 워크플로가 10분마다 /health 를 핑해 서버를
# 깨어 있게 유지한다. 비용 0원(GitHub Actions 무료 분 사용).
name: keep-render-awake

on:
  schedule:
    # 매 10분. GitHub 스케줄은 UTC 기준이며 부하 시 다소 지연될 수 있으나,
    # Render 의 15분 유휴 임계보다 짧게 유지된다.
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health (with retry)
        run: |
          URL="https://ktms-admin-api.onrender.com/health"
          for i in 1 2 3 4 5 6; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$URL" || echo "000")
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Render is awake."
              exit 0
            fi
            sleep 15
          done
          echo "Health check did not return 200 after retries."
          exit 1
